services:
  db:
    image: postgres:16
    command: ["postgres", "-c", "lc_messages=C", "-c", "client_encoding=UTF8"]
    environment:
      POSTGRES_DB: grpc_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8 --lc-messages=C"
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d grpc_api"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data



volumes:
  postgres_data:
